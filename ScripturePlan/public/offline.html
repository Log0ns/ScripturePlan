<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planny — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #e0e7ff, #c7d2fe);
      color: #334155;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 320px; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { font-size: 1rem; opacity: 0.8; line-height: 1.5; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    button {
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      background: #4f46e5;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📖</div>
    <h1>You're Offline</h1>
    <p>Planny needs a connection to load for the first time. Your reading progress is saved locally and will be here when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
